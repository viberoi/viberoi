name: viberoi-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: viberoi-postgres
    # Host port 5433 (not 5432) to coexist with any host-installed Postgres.
    # Container-internal port stays 5432 — used by other compose services.
    ports:
      - "5433:5432"
    environment:
      # `postgres` superuser is the bootstrap; init.sql creates the
      # real app roles (viberoi, viberoi_admin) as non-superuser.
      # Postgres refuses to let the bootstrap user demote itself, so
      # we never make `viberoi` the bootstrap.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: viberoi
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d viberoi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: viberoi-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: viberoi-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs,kms,secretsmanager,iam
      DEBUG: 0
      DEFAULT_REGION: us-east-1
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: 1
    volumes:
      - localstack-data:/var/lib/localstack
      - ./scripts/localstack-init.sh:/etc/localstack/init/ready.d/init.sh:ro
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  localstack-data:
