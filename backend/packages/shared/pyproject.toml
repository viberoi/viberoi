[project]
name = "viberoi-shared"
version = "0.1.0"
description = "VibeROI shared library — DB, Redis, crypto, logging, errors, domain types. Consumed by all services and lambdas."
requires-python = ">=3.12,<3.13"
dependencies = [
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29.0",
    "psycopg[binary]>=3.2.0",  # sync driver for Alembic migrations
    "alembic>=1.13.0",
    "pydantic>=2.7.0",
    "pydantic-settings>=2.3.0",
    "redis[hiredis]>=5.0.0",
    "aioboto3>=13.0.0",
    "argon2-cffi>=23.1.0",
    "cryptography>=42.0.0",
    "structlog>=24.1.0",
    "fastapi>=0.111.0",
    "PyJWT[crypto]>=2.8.0",
    "httpx>=0.27.0",
    "orjson>=3.10.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["viberoi_shared"]
