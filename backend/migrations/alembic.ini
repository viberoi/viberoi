[alembic]
# %(here)s expands to the directory of this alembic.ini file, so paths
# resolve correctly whether you cd into backend/migrations or invoke from
# the repo root with `-c backend/migrations/alembic.ini`.
script_location = %(here)s
prepend_sys_path = %(here)s/../packages/shared
version_path_separator = os
# Placeholder — env.py overrides via SharedSettings.database_admin_url
sqlalchemy.url = postgresql+psycopg://viberoi_admin:viberoi_admin@localhost:5433/viberoi

# Naming conventions for autogenerated constraints (predictable migration diffs)
[alembic:exclude]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
