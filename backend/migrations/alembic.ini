[alembic]
script_location = .
prepend_sys_path = ../..
version_path_separator = os
sqlalchemy.url = postgresql+psycopg://viberoi_admin:viberoi_admin@localhost:5432/viberoi

# Naming conventions for autogenerated constraints (predictable migration diffs)
[alembic:exclude]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
